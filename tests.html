<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CollegeMax Tests</title>
  <style>
    body { font-family: "SF Mono", "Consolas", monospace; background: #0b0d12; color: #e7eaf3; padding: 24px; font-size: 13px; }
    h1 { font-size: 16px; margin-bottom: 8px; }
    #test-summary { padding: 8px 12px; border-radius: 6px; margin: 12px 0; display: inline-block; font-weight: 700; }
    #test-summary.pass { background: #10b981; color: white; }
    #test-summary.fail { background: #ef4444; color: white; }
    .test-row { padding: 4px 8px; border-bottom: 1px solid #1a1d27; }
    .test-row.pass { color: #10b981; }
    .test-row.fail { color: #ef4444; font-weight: 700; }
  </style>
</head>
<body>
  <h1>CollegeMax Test Suite</h1>
  <div id="test-summary">Running...</div>
  <div id="test-output"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="tests.js"></script>
</body>
</html>
